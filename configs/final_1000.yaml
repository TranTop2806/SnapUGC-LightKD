# Reference configuration for the first thesis-scale run.
# The current scripts use argparse; keep this file as the documented run contract.
extraction:
  max_videos: 2000
  num_frames: 16
  motion_clips: 4
  motion_frames: 16
  caption_frames: 3
  clip_model: openai/clip-vit-base-patch16
  text_model: sentence-transformers/sentence-t5-base
  caption_model: Salesforce/blip-image-captioning-base

training:
  teacher_hidden: 512
  teacher_blocks: 2
  teacher_epochs: 40
  student_hidden: 256
  student_epochs: 60
  batch_size: 16
  alpha_soft_ecr: 0.5
  beta_hidden_kd: 0.3
  attention_kd: 0.1
  gamma_aesthetic: 0.2
  delta_technical: 0.2
